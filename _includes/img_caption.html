<div clas="captioned-img-container">
    {% if include.src3 %}
    <div class="img-container">
        <img class="side_img" src="{{ include.src | absolute_url }}" alt="{{ include.alt | default: 'Image' }}">
        <img class="side_img" src="{{ include.src2 | absolute_url }}" alt="{{ include.alt2 | default: 'Image' }}">
        <img class="side_img" src="{{ include.src3 | absolute_url }}" alt="{{ include.alt3 | default: 'Image' }}">
    </div>
    {% elsif include.src2 %}
    <div class="img-container">
        <img class="side_img" src="{{ include.src | absolute_url }}" alt="{{ include.alt | default: 'Image' }}">
        <img class="side_img" src="{{ include.src2 | absolute_url }}" alt="{{ include.alt2 | default: 'Image' }}">
    </div>
    {% else %}
    <div class="img-container">
        <img src="{{ include.src | absolute_url }}" alt="{{include.alt}}">
    </div>
    {% endif %}
    <p class="caption">
        {{include.caption}}
    </p>
</div>
